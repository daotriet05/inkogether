services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app1:
    build: .
    image: inkogether:1.0
    environment:
      - APP_NAME=app1
      - PORT=3001
      - REDIS_URL=redis://redis:6379
      - REPLICA_NAMES=app1,app2,app3
      - REPLICA_PUBLIC_ENDPOINTS=http://localhost:3001,http://localhost:3002,http://localhost:3003
    ports:
      - "3001:3001"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + process.env.PORT + '/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5

  app2:
    build: .
    image: inkogether:1.0
    environment:
      - APP_NAME=app2
      - PORT=3002
      - REDIS_URL=redis://redis:6379
      - REPLICA_NAMES=app1,app2,app3
      - REPLICA_PUBLIC_ENDPOINTS=http://localhost:3001,http://localhost:3002,http://localhost:3003
    ports:
      - "3002:3002"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + process.env.PORT + '/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5

  app3:
    build: .
    image: inkogether:1.0
    environment:
      - APP_NAME=app3
      - PORT=3003
      - REDIS_URL=redis://redis:6379
      - REPLICA_NAMES=app1,app2,app3
      - REPLICA_PUBLIC_ENDPOINTS=http://localhost:3001,http://localhost:3002,http://localhost:3003
    ports:
      - "3003:3003"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + process.env.PORT + '/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:stable
    ports:
      - "3000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
      - app3

networks:
  default:
    driver: bridge